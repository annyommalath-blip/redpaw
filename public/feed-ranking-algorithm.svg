<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F8FC"/>
      <stop offset="1" stop-color="#EEF3F8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2F6FED"/>
      <stop offset="1" stop-color="#4D9BFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <style>
      .title { font: 700 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .stageTitle { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .stageBody { font: 500 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .smallLabel { font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2F6FED; letter-spacing: 0.08em; }
      .formulaTitle { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .formula { font: 600 20px Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #0F172A; }
      .formulaNote { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .pill { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1E3A8A; }
      .footer { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748B; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1430" cy="120" r="180" fill="#DCEBFF"/>
  <circle cx="120" cy="780" r="160" fill="#E9F5FF"/>

  <text x="90" y="88" class="title">AI-Inspired Home Feed Ranking</text>
  <text x="90" y="120" class="subtitle">Slide-ready overview of the current RedPaw Home feed structure and scoring model</text>

  <g filter="url(#shadow)">
    <rect x="80" y="170" width="250" height="250" rx="28" fill="url(#panel)"/>
    <text x="110" y="212" class="smallLabel">STEP 1</text>
    <text x="110" y="250" class="stageTitle">Candidate</text>
    <text x="110" y="280" class="stageTitle">Retrieval</text>
    <text x="110" y="330" class="stageBody">Recent original posts</text>
    <text x="110" y="360" class="stageBody">Relevant reposts</text>
    <text x="110" y="390" class="stageBody">Base pool from Supabase</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="380" y="170" width="250" height="250" rx="28" fill="url(#panel)"/>
    <text x="410" y="212" class="smallLabel">STEP 2</text>
    <text x="410" y="250" class="stageTitle">Feed</text>
    <text x="410" y="280" class="stageTitle">Enrichment</text>
    <text x="410" y="330" class="stageBody">Profiles</text>
    <text x="410" y="360" class="stageBody">Like / comment / repost counts</text>
    <text x="410" y="390" class="stageBody">Saved, liked, reposted state</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="680" y="170" width="250" height="250" rx="28" fill="url(#panel)"/>
    <text x="710" y="212" class="smallLabel">STEP 3</text>
    <text x="710" y="250" class="stageTitle">User Taste</text>
    <text x="710" y="280" class="stageTitle">Profile</text>
    <text x="710" y="330" class="stageBody">Past likes, saves, reposts</text>
    <text x="710" y="360" class="stageBody">Preferred authors</text>
    <text x="710" y="390" class="stageBody">Caption tokens, photo preference</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="980" y="170" width="250" height="250" rx="28" fill="url(#panel)"/>
    <text x="1010" y="212" class="smallLabel">STEP 4</text>
    <text x="1010" y="250" class="stageTitle">Ranking</text>
    <text x="1010" y="280" class="stageTitle">Score</text>
    <text x="1010" y="330" class="stageBody">Freshness</text>
    <text x="1010" y="360" class="stageBody">Engagement</text>
    <text x="1010" y="390" class="stageBody">Preference match + quality</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1280" y="170" width="250" height="250" rx="28" fill="url(#panel)"/>
    <text x="1310" y="212" class="smallLabel">STEP 5</text>
    <text x="1310" y="250" class="stageTitle">Diversity</text>
    <text x="1310" y="280" class="stageTitle">Control</text>
    <text x="1310" y="330" class="stageBody">Reduce repeated authors</text>
    <text x="1310" y="360" class="stageBody">Keep top feed varied</text>
    <text x="1310" y="390" class="stageBody">Output final Home ranking</text>
  </g>

  <g>
    <path d="M330 295H380" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M630 295H680" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M930 295H980" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M1230 295H1280" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M368 282L380 295L368 308" stroke="#4D9BFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M668 282L680 295L668 308" stroke="#4D9BFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M968 282L980 295L968 308" stroke="#4D9BFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1268 282L1280 295L1268 308" stroke="#4D9BFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="120" y="490" width="1360" height="260" rx="32" fill="url(#panel)"/>
    <text x="160" y="540" class="formulaTitle">Ranking Formula</text>
    <text x="160" y="592" class="formula">ranking_score = 0.40 × recency + 0.22 × engagement + 0.23 × preference</text>
    <text x="160" y="628" class="formula">               + 0.10 × content_quality + exploration_boost + repost_boost</text>

    <rect x="160" y="668" width="185" height="42" rx="21" fill="#E6F0FF"/>
    <text x="190" y="695" class="pill">Recency decay</text>

    <rect x="365" y="668" width="222" height="42" rx="21" fill="#EAF7EE"/>
    <text x="396" y="695" class="pill" style="fill:#166534;">Weighted engagement</text>

    <rect x="607" y="668" width="218" height="42" rx="21" fill="#FFF4E5"/>
    <text x="638" y="695" class="pill" style="fill:#9A3412;">User preference match</text>

    <rect x="845" y="668" width="203" height="42" rx="21" fill="#F3E8FF"/>
    <text x="876" y="695" class="pill" style="fill:#6B21A8;">Photo + caption quality</text>

    <rect x="1068" y="668" width="166" height="42" rx="21" fill="#FFE9F0"/>
    <text x="1099" y="695" class="pill" style="fill:#9D174D;">Exploration boost</text>

    <rect x="1254" y="668" width="136" height="42" rx="21" fill="#E6F7F7"/>
    <text x="1285" y="695" class="pill" style="fill:#155E75;">Repost boost</text>
  </g>

  <text x="160" y="790" class="footer">Preference is inferred from past likes, saves, reposts, preferred authors, caption keywords, and photo-heavy interactions.</text>
  <text x="160" y="818" class="footer">A final author-diversification pass reduces repeated creators so the top of the feed feels fresher and more balanced.</text>
</svg>
